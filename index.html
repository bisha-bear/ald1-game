<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALD1 Jigsaw</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --main-blue: #B5C6E0;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --accent-blue: #78909c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: var(--text-dark);
            padding: 20px;
        }

        /* 網頁最上方大標題 */
        .main-header {
            font-size: 32px;
            font-weight: bold;
            color: #5072a7;
            margin-bottom: 25px;
            letter-spacing: 2px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* 難度選擇區 */
        .difficulty-container {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 90%;
        }

        .diff-label {
            font-weight: bold;
            color: #555;
        }

        .diff-btn {
            background-color: #e0e6ed;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            color: #666;
            transition: all 0.2s;
        }

        .diff-btn.active {
            background-color: #5072a7;
            color: #fff;
            box-shadow: 0 2px 6px rgba(80,114,167,0.3);
        }

        /* 關卡選擇畫面 */
        #selection-screen {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding: 10px;
            max-width: 1000px;
            width: 100%;
        }

        @media (max-width: 800px) {
            #selection-screen { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            #selection-screen { grid-template-columns: 1fr; }
        }

        /* 專輯盒外觀 (指定色號 #B5C6E0，無條碼) */
        .album-card {
            background-color: var(--main-blue);
            padding: 12px 12px 45px 12px;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.06);
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .album-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 22px rgba(0,0,0,0.12);
        }

        .album-img-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            background: #eef2f7;
            border-radius: 2px;
        }

        .album-img {
            width: 100%;
            display: block;
            object-fit: contain;
        }

        .album-footer {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
        }

        /* 遊戲主畫面 */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1400px;
        }

        .controls-top {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            max-width: 1300px;
            margin-bottom: 20px;
            gap: 10px;
        }

        .btn {
            background-color: var(--main-blue);
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: background 0.2s;
        }
        .btn:hover { background-color: #9cb2d4; }

        #btn-audio {
            background-color: var(--accent-blue);
        }
        #btn-audio:hover { background-color: #617d8a; }

        /* 拼圖區佈局優化 */
        #puzzle-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
        }

        @media (max-width: 1100px) {
            #puzzle-container {
                flex-direction: column;
                align-items: center;
            }
        }

        /* 左側目標底板區 */
        #puzzle-board {
            background-color: rgba(0,0,0,0.03);
            border: 2px dashed rgba(0,0,0,0.15);
            position: relative;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.02);
        }

        /* 右側放任移動零件池（寬度微調，適配高難度大容量） */
        #pieces-pool {
            flex-grow: 1;
            width: 100%;
            max-width: 650px;
            height: 550px;
            background-color: #eef2f7;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            position: relative;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* 拼圖塊基本樣式 */
        .puzzle-piece {
            position: absolute;
            cursor: move;
            touch-action: none;
            user-select: none;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2));
            z-index: 10;
            will-change: transform, left, top; /* 啟用硬體加速，防止高片數卡頓 */
        }
        .puzzle-piece:active {
            filter: drop-shadow(3px 4px 6px rgba(0,0,0,0.25));
            z-index: 9999;
        }
    </style>
</head>
<body>

    <!-- 網頁最上方標題 -->
    <h1 class="main-header">ALD1 拼圖</h1>

    <!-- 重新配置的自選片數按鈕 -->
    <div class="difficulty-container" id="diff-selector">
        <span class="diff-label">選擇片數：</span>
        <button class="diff-btn active" onclick="setDifficulty(6, 4, this)">24 片</button>
        <button class="diff-btn" onclick="setDifficulty(9, 6, this)">54 片</button>
        <button class="diff-btn" onclick="setDifficulty(12, 8, this)">96 片</button>
        <button class="diff-btn" onclick="setDifficulty(18, 12, this)">216 片</button>
        <button class="diff-btn" onclick="setDifficulty(24, 16, this)">384 片</button>
        <button class="diff-btn" onclick="setDifficulty(30, 20, this)">600 片</button>
    </div>

    <audio id="bg-music"></audio>

    <!-- 大廳關卡畫面 -->
    <div id="selection-screen"></div>

    <!-- 遊戲拼圖畫面 -->
    <div id="game-screen">
        <div class="controls-top">
            <button class="btn" onclick="backToMenu()">← 返回關卡選擇</button>
            <button class="btn" id="btn-audio" onclick="toggleAudio()">🎵 播放隨機 BGM</button>
        </div>
        
        <h2 id="current-title" style="margin-bottom: 20px; font-family: monospace; text-align: center; color: #5072a7;"></h2>
        
        <div id="puzzle-container">
            <div id="puzzle-board"></div>
            <div id="pieces-pool"></div>
        </div>
    </div>

    <script>
        // 照片清單
        const levelList = [
            { title: 'NST_1', imgUrl: 'nst_1.jpg' },
            { title: 'NST_2', imgUrl: 'nst_2.jpg' },
            { title: 'NST_3', imgUrl: 'nst_3.jpg' },
            { title: 'NST_4', imgUrl: 'nst_4.jpg' },
            { title: 'NST_5', imgUrl: 'nst_5.jpg' },
            { title: 'NST_6', imgUrl: 'nst_6.jpg' },
            { title: 'NST_7', imgUrl: 'nst_7.jpg' },
            { title: 'NST_8', imgUrl: 'nst_8.jpg' }
        ];

        // 音樂清單
        const playlist = [
            { file: 'formula.mp3', name: 'FORMULA' },
            { file: 'freak_alarm.mp3', name: 'Freak Alarm' },
            { file: 'raw_flame.mp3', name: 'Raw Flame' },
            { file: 'chains.mp3', name: 'Chains' },
            { file: 'nb2h.mp3', name: 'Never Been 2 Heaven' },
            { file: 'cinnamom_shake.mp3', name: 'Cinnamon Shake' },
            { file: 'omg.mp3', name: 'OMG!' },
            { file: 'good_life.mp3', name: 'Good Life' },
            { file: 'go_go.mp3', name: 'GO!GO!' }
        ];

        // 預設難度為 24 片 (6x4)
        let COLS = 6;
        let ROWS = 4;
        const BASE_WIDTH = 550; // 微調看板寬度適配大片數

        let currentImgUrl = '';
        let edgesData = []; 
        let audio = document.getElementById('bg-music');
        let isAudioPlaying = false;
        let currentPlayingTrack = null;

        audio.addEventListener('ended', () => {
            currentPlayingTrack = null;
            playRandomMusic();
        });

        // 設定自選難度片數
        function setDifficulty(cols, rows, btnElement) {
            COLS = cols;
            ROWS = rows;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        // 初始化選關清單
        function initMenu() {
            const screen = document.getElementById('selection-screen');
            screen.innerHTML = ''; 
            
            levelList.forEach(lv => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.onclick = () => startGame(lv.title, lv.imgUrl);
                card.innerHTML = `
                    <div class="album-img-wrapper">
                        <img class="album-img" src="${lv.imgUrl}" alt="${lv.title}">
                    </div>
                    <div class="album-footer">
                        <span>${lv.title}</span>
                    </div>
                `;
                screen.appendChild(card);
            });
        }

        function playRandomMusic() {
            if (playlist.length === 0) return;
            if (!currentPlayingTrack) {
                const randomIndex = Math.floor(Math.random() * playlist.length);
                currentPlayingTrack = playlist[randomIndex];
                audio.src = currentPlayingTrack.file;
                audio.load();
            }
            audio.play().then(() => {
                isAudioPlaying = true;
                document.getElementById('btn-audio').innerText = `⏸️ 暫停: ${currentPlayingTrack.name}`;
            }).catch(e => {
                isAudioPlaying = false;
                document.getElementById('btn-audio').innerText = `🎵 播放隨機 BGM`;
            });
        }

        function toggleAudio() {
            if (!audio.src || !currentPlayingTrack) {
                const randomIndex = Math.floor(Math.random() * playlist.length);
                currentPlayingTrack = playlist[randomIndex];
                audio.src = currentPlayingTrack.file;
                audio.load();
            }
            if (!isAudioPlaying) {
                audio.play().then(() => {
                    isAudioPlaying = true;
                    document.getElementById('btn-audio').innerText = `⏸️ 暫停: ${currentPlayingTrack.name}`;
                });
            } else {
                audio.pause();
                isAudioPlaying = false;
                document.getElementById('btn-audio').innerText = `🎵 播放隨機 BGM`;
            }
        }

        function backToMenu() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'grid';
            document.getElementById('diff-selector').style.display = 'flex';
            document.getElementById('puzzle-board').innerHTML = '';
            document.getElementById('pieces-pool').innerHTML = '';
            
            audio.pause();
            isAudioPlaying = false;
            currentPlayingTrack = null;
            document.getElementById('btn-audio').innerText = `🎵 播放隨機 BGM`;
        }

        function startGame(title, imgUrl) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('diff-selector').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('current-title').innerText = `PLAYING: ${title} (${ROWS * COLS}片)`;
            currentImgUrl = imgUrl;

            playRandomMusic();

            const tempImg = new Image();
            tempImg.src = imgUrl;
            tempImg.onload = function() {
                const imgWidth = tempImg.width;
                const imgHeight = tempImg.height;
                const ratio = imgHeight / imgWidth;

                const boardWidth = BASE_WIDTH;
                const boardHeight = BASE_WIDTH * ratio;

                const board = document.getElementById('puzzle-board');
                board.style.width = `${boardWidth}px`;
                board.style.height = `${boardHeight}px`;

                const pieceWidth = boardWidth / COLS;
                const pieceHeight = boardHeight / ROWS;

                generateEdgeRelations();
                createPuzzlePieces(boardWidth, boardHeight, pieceWidth, pieceHeight);
            };
        }

        function generateEdgeRelations() {
            edgesData = [];
            for (let r = 0; r < ROWS; r++) {
                edgesData[r] = [];
                for (let c = 0; c < COLS; c++) { edgesData[r][c] = [0, 0, 0, 0]; }
            }
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (c < COLS - 1) {
                        let type = Math.random() > 0.5 ? 1 : -1;
                        edgesData[r][c][1] = type; edgesData[r][c+1][3] = -type;
                    }
                    if (r < ROWS - 1) {
                        let type = Math.random() > 0.5 ? 1 : -1;
                        edgesData[r][c][2] = type; edgesData[r+1][c][0] = -type;
                    }
                }
            }
        }

        function createPuzzlePiecePath(w, h, top, right, bottom, left) {
            let p = Math.min(w, h) * 0.22; 
            let path = `M 0 0`;
            if (top === 1) { path += ` H ${w*0.35} C ${w*0.35} ${-p}, ${w*0.4} ${-p}, ${w*0.4} ${-p} C ${w*0.35} ${-p*1.6}, ${w*0.65} ${-p*1.6}, ${w*0.6} ${-p} C ${w*0.6} ${-p}, ${w*0.65} ${-p}, ${w*0.65} 0 H ${w}`; } 
            else if (top === -1) { path += ` H ${w*0.35} C ${w*0.35} ${p}, ${w*0.4} ${p}, ${w*0.4} ${p} C ${w*0.35} ${p*1.6}, ${w*0.65} ${p*1.6}, ${w*0.6} ${p} C ${w*0.6} ${p}, ${w*0.65} ${p}, ${w*0.65} 0 H ${w}`; } 
            else { path += ` H ${w}`; }
            if (right === 1) { path += ` V ${h*0.35} C ${w+p} ${h*0.35}, ${w+p} ${h*0.4}, ${w+p} ${h*0.4} C ${w+p*1.6} ${h*0.35}, ${w+p*1.6} ${h*0.65}, ${w+p} ${h*0.6} C ${w+p} ${h*0.6}, ${w+p} ${h*0.65}, ${w} ${h*0.65} V ${h}`; } 
            else if (right === -1) { path += ` V ${h*0.35} C ${w-p} ${h*0.35}, ${w-p} ${h*0.4}, ${w-p} ${h*0.4} C ${w-p*1.6} ${h*0.35}, ${w-p*1.6} ${h*0.65}, ${w-p} ${h*0.6} C ${w-p} ${h*0.6}, ${w-p} ${h*0.65}, ${w} ${h*0.65} V ${h}`; } 
            else { path += ` V ${h}`; }
            if (bottom === 1) { path += ` H ${w*0.65} C ${w*0.65} ${h+p}, ${w*0.6} ${h+p}, ${w*0.6} ${h+p} C ${w*0.65} ${h+p*1.6}, ${w*0.35} ${h+p*1.6}, ${w*0.4} ${h+p} C ${w*0.4} ${h+p}, ${w*0.35} ${h+p}, ${w*0.35} ${h} H 0`; } 
            else if (bottom === -1) { path += ` H ${w*0.65} C ${w*0.65} ${h-p}, ${w*0.6} ${h-p}, ${w*0.6} ${h-p} C ${w*0.65} ${h-p*1.6}, ${w*0.35} ${h-p*1.6}, ${w*0.4} ${h-p} C ${w*0.4} ${h-p}, ${w*0.35} ${h-p}, ${w*0.35} ${h} H 0`; } 
            else { path += ` H 0`; }
            if (left === 1) { path += ` V ${h*0.65} C ${-p} ${h*0.65}, ${-p} ${h*0.6}, ${-p} ${h*0.6} C ${-p*1.6} ${h*0.65}, ${-p*1.6} ${h*0.35}, ${-p} ${h*0.4} C ${-p} ${h*0.4}, ${-p} ${h*0.35}, 0 ${h*0.35} V 0`; } 
            else if (left === -1) { path += ` V ${h*0.65} C ${p} ${h*0.65}, ${p} ${h*0.6}, ${p} ${h*0.6} C ${p*1.6} ${h*0.65}, ${p*1.6} ${h*0.35}, ${p} ${h*0.4} C ${p} ${h*0.4}, ${p} ${h*0.35}, 0 ${h*0.35} V 0`; } 
            else { path += ` V 0`; }
            path += ` Z`; return path;
        }

        function createPuzzlePieces(bWidth, bHeight, pWidth, pHeight) {
            const pool = document.getElementById('pieces-pool');
            const board = document.getElementById('puzzle-board');
            const pmax = Math.min(pWidth, pHeight) * 0.35; 

            let oldSvg = document.getElementById('puzzle-defs');
            if(oldSvg) oldSvg.remove();

            let svgDefs = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svgDefs.id = "puzzle-defs";
            svgDefs.style.width = "0"; svgDefs.style.height = "0"; svgDefs.style.position = "absolute";
            let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let edges = edgesData[r][c];
                    let pathD = createPuzzlePiecePath(pWidth, pHeight, edges[0], edges[1], edges[2], edges[3]);
                    let clipPath = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
                    clipPath.setAttribute("id", `clip-${r}-${c}`);
                    let pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    pathEl.setAttribute("d", pathD);
                    clipPath.appendChild(pathEl); defs.appendChild(clipPath);
                }
            }
            svgDefs.appendChild(defs); document.body.appendChild(svgDefs);

            // 使用 DocumentFragment 進行預渲染優化，解決高難度下的跑圖卡頓
            const fragment = document.createDocumentFragment();

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const piece = document.createElement('div');
                    piece.classList.add('puzzle-piece');
                    piece.style.width = `${pWidth + pmax * 2}px`;
                    piece.style.height = `${pHeight + pmax * 2}px`;

                    const targetX = c * pWidth - pmax;
                    const targetY = r * pHeight - pmax;
                    piece.dataset.correctX = targetX; piece.dataset.correctY = targetY;

                    const innerImg = document.createElement('div');
                    innerImg.style.width = '100%'; innerImg.style.height = '100%';
                    innerImg.style.backgroundImage = `url(${currentImgUrl})`;
                    innerImg.style.backgroundSize = `${bWidth}px ${bHeight}px`;
                    
                    // 百分之百完美背景裁剪對齊公式
                    innerImg.style.backgroundPosition = `-${c * pWidth - pmax}px -${r * pHeight - pmax}px`;
                    innerImg.style.clipPath = `url(#clip-${r}-${c})`;
                    innerImg.style.transform = `translate(${pmax}px, ${pmax}px)`;
                    piece.appendChild(innerImg);

                    // 隨機在零件池散落
                    const randomX = Math.random() * (pool.clientWidth - (pWidth + pmax * 2));
                    const randomY = Math.random() * (pool.clientHeight - (pHeight + pmax * 2));
                    piece.style.left = `${Math.max(0, randomX)}px`; 
                    piece.style.top = `${Math.max(0, randomY)}px`;
                    
                    fragment.appendChild(piece);
                    enableDrag(piece);
                }
            }
            pool.appendChild(fragment);
        }

        function enableDrag(el) {
            let offsetX = 0, offsetY = 0; 
            let isDragging = false;

            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
                e.preventDefault(); 
                isDragging = true;
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                const rect = el.getBoundingClientRect();
                offsetX = clientX - rect.left; 
                offsetY = clientY - rect.top;

                const currentBodyRect = document.body.getBoundingClientRect();
                el.style.left = `${rect.left - currentBodyRect.left}px`;
                el.style.top = `${rect.top - currentBodyRect.top}px`;
                document.body.appendChild(el);

                document.addEventListener('mousemove', dragMove);
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchend', dragEnd);
            }

            function dragMove(e) {
                if (!isDragging) return;
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                const bodyRect = document.body.getBoundingClientRect();
                el.style.left = `${clientX - bodyRect.left - offsetX}px`;
                el.style.top = `${clientY - bodyRect.top - offsetY}px`;
            }

            function dragEnd() {
                if (!isDragging) return; 
                isDragging = false;
                
                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchend', dragEnd);

                const board = document.getElementById('puzzle-board');
                const pool = document.getElementById('pieces-pool');
                const boardRect = board.getBoundingClientRect();
                const poolRect = pool.getBoundingClientRect();
                const pieceRect = el.getBoundingClientRect();
                
                const relativeX = pieceRect.left - boardRect.left;
                const relativeY = pieceRect.top - boardRect.top;
                const targetX = parseFloat(el.dataset.correctX);
                const targetY = parseFloat(el.dataset.correctY);

                // 判定是否拼對（吸附範圍：30px）
                if (Math.abs(relativeX - targetX) < 30 && Math.abs(relativeY - targetY) < 30) {
                    el.style.left = `${targetX}px`; 
                    el.style.top = `${targetY}px`;
                    board.appendChild(el); 
                    el.style.cursor = 'default';
                    el.removeEventListener('mousedown', dragStart);
                    el.removeEventListener('touchstart', dragStart);
                    checkWinCondition();
                } else {
                    // 沒拼對不會回彈，自由留在滑鼠放開的位置
                    const currentPoolX = pieceRect.left - poolRect.left;
                    const currentPoolY = pieceRect.top - poolRect.top;
                    el.style.left = `${currentPoolX}px`;
                    el.style.top = `${currentPoolY}px`;
                    pool.appendChild(el);
                }
            }
        }

        function checkWinCondition() {
            const board = document.getElementById('puzzle-board');
            if (board.children.length === (ROWS * COLS)) {
                setTimeout(() => { alert('🎉 太厲害了！順利完成「ALD1 拼圖」！'); }, 300);
            }
        }

        initMenu();
    </script>
</body>
