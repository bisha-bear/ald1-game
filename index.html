<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALD1 Jigsaw</title>
    <style>
        :root {
            --bg-color: #3d262a;
            --card-bg: #c5b4a5;
            --text-dark: #1a1a1a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            color: #fff;
        }

        /* 關卡選擇畫面 - 響應式網格 */
        #selection-screen {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        /* 專輯盒 3D 樣式 */
        .album-card {
            background-color: var(--card-bg);
            padding: 12px 12px 45px 12px;
            position: relative;
            box-shadow: 
                5px 5px 0px rgba(0,0,0,0.2),
                10px 10px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
        }

        .album-card::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 5px;
            width: 10px;
            height: 100%;
            background: #9e8e7f;
            transform: skewY(45deg);
        }
        .album-card::before {
            content: '';
            position: absolute;
            left: 5px;
            bottom: -10px;
            width: 100%;
            height: 10px;
            background: #857567;
            transform: skewX(45deg);
        }

        .album-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 
                7px 7px 0px rgba(0,0,0,0.2),
                12px 12px 20px rgba(0,0,0,0.4);
        }

        .album-img-wrapper {
            position: relative;
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
            background: #222;
        }

        .album-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 底部文字與條形碼 */
        .album-footer {
            position: absolute;
            bottom: 8px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dark);
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
        }

        .barcode {
            width: 45px;
            height: 22px;
            background: linear-gradient(90deg, 
                #000 0%, #000 10%, transparent 10%, transparent 15%,
                #000 15%, #000 35%, transparent 35%, transparent 40%,
                #000 40%, #000 45%, transparent 45%, transparent 55%,
                #000 55%, #000 60%, transparent 60%, transparent 70%,
                #000 70%, #000 90%, transparent 90%, transparent 95%, #000 95%);
            opacity: 0.7;
        }

        /* 遊戲主畫面 */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        /* 控制列佈局 */
        .controls-top {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            max-width: 840px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--text-dark);
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.3);
        }
        .btn:hover { background-color: #b5a495; }

        /* 🎵 音樂按鈕樣式 */
        #btn-audio {
            background-color: #7d93a4;
            color: white;
        }
        #btn-audio:hover { background-color: #5d7284; }

        /* 拼圖遊玩板塊 */
        #puzzle-container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
        }

        /* 右側：收納/散落區 */
        #pieces-pool {
            width: 400px;
            height: 500px;
            background-color: #2c3238;
            border-radius: 4px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* 左側：目標底板 */
        #puzzle-board {
            width: 400px;
            height: 400px;
            background-color: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            position: relative;
        }

        /* 真正的互鎖拼圖塊 */
        .puzzle-piece {
            position: absolute;
            cursor: move;
            touch-action: none;
            user-select: none;
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.5));
            z-index: 10;
        }
        .puzzle-piece:active {
            filter: drop-shadow(5px 5px 8px rgba(0,0,0,0.7));
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- 🔊 隱藏的音訊標籤 -->
    <audio id="bg-music" loop></audio>

    <!-- 關卡選擇畫面 -->
    <div id="selection-screen"></div>

    <!-- 遊戲主畫面 -->
    <div id="game-screen">
        <div class="controls-top">
            <button class="btn" onclick="backToMenu()">← 返回關卡選擇</button>
            <button class="btn" id="btn-audio" onclick="toggleAudio()">🎵 播放隨機 BGM</button>
        </div>
        
        <h2 id="current-title" style="margin-bottom: 20px; font-family: monospace;"></h2>
        
        <div id="puzzle-container">
            <!-- 左側置放區 -->
            <div id="puzzle-board"></div>
            <!-- 右側零件池 -->
            <div id="pieces-pool"></div>
        </div>
    </div>

    <script>
        // 🖼️ 【新增照片拼圖關卡請改這裡！】
        // 以後要加新照片，直接按照格式在括號內加上：title 和 imgUrl 即可
        const levelList = [
            { title: 'NST_1', imgUrl: 'nst_1.jpg' },
            { title: 'NST_2', imgUrl: 'nst_2.jpg' },
            { title: 'NST_3', imgUrl: 'nst_3.jpg' },
            { title: 'NST_4', imgUrl: 'nst_4.jpg' },
            { title: 'NST_5', imgUrl: 'nst_5.jpg' },
            { title: 'NST_6', imgUrl: 'nst_6.jpg' },
            { title: 'NST_7', imgUrl: 'nst_7.jpg' },
            { title: 'NST_8', imgUrl: 'nst_8.jpg' },
        ];

        // 🎼 音樂對照表（維持小寫設定）
        const playlist = [
            { file: 'formula.mp3', name: 'FORMULA' },
            { file: 'freak_alarm.mp3', name: 'Freak Alarm' },
            { file: 'raw_flame.mp3', name: 'Raw Flame' },
            { file: 'chains.mp3', name: 'Chains' },
            { file: 'nb2h.mp3', name: 'Never Been 2 Heaven' },
            { file: 'cinnamom_shake.mp3', name: 'Cinnamon Shake' },
            { file: 'omg.mp3', name: 'OMG!' },
            { file: 'good_life.mp3', name: 'Good Life' },
            { file: 'go_go.mp3', name: 'GO!GO!' },
        ];

        // 拼圖參數設定 (3x3 網格)
        const ROWS = 3;
        const COLS = 3;
        const BOARD_SIZE = 400; 
        const PIECE_SIZE = BOARD_SIZE / ROWS; 

        let currentImgUrl = '';
        let edgesData = []; 
        let audio = document.getElementById('bg-music');
        let isAudioPlaying = false;
        let currentPlayingTrack = null;

        // 初始化關卡大廳
        function initMenu() {
            const screen = document.getElementById('selection-screen');
            screen.innerHTML = ''; 
            
            levelList.forEach(lv => {
                const card = document.createElement('div');
                card.className = 'album-card';
                card.onclick = () => startGame(lv.title, lv.imgUrl);
                card.innerHTML = `
                    <div class="album-img-wrapper">
                        <img class="album-img" src="${lv.imgUrl}" alt="${lv.title}">
                    </div>
                    <div class="album-footer">
                        <span>${lv.title}</span>
                        <div class="barcode"></div>
                    </div>
                `;
                screen.appendChild(card);
            });
        }

        // 🔀 隨機挑選音樂播放的函式
        function playRandomMusic() {
            if (playlist.length === 0) return;
            const randomIndex = Math.floor(Math.random() * playlist.length);
            currentPlayingTrack = playlist[randomIndex];
            
            audio.src = currentPlayingTrack.file;
            audio.load();
            
            audio.play().then(() => {
                isAudioPlaying = true;
                document.getElementById('btn-audio').innerText = `⏸️ 暫停: ${currentPlayingTrack.name}`;
            }).catch(e => {
                isAudioPlaying = false;
                document.getElementById('btn-audio').innerText = `🎵 播放隨機 BGM`;
            });
        }

        // ⏸️ 手動切換暫停/播放
        function toggleAudio() {
            if (!audio.src || !currentPlayingTrack) {
                playRandomMusic();
                return;
            }
            if (!isAudioPlaying) {
                audio.play();
                isAudioPlaying = true;
                document.getElementById('btn-audio').innerText = `⏸️ 暫停: ${currentPlayingTrack.name}`;
            } else {
                audio.pause();
                isAudioPlaying = false;
                document.getElementById('btn-audio').innerText = `🎵 播放隨機 BGM`;
            }
        }

        function backToMenu() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'grid';
            document.getElementById('puzzle-board').innerHTML = '';
            document.getElementById('pieces-pool').innerHTML = '';
            
            audio.pause();
            isAudioPlaying = false;
            currentPlayingTrack = null;
            document.getElementById('btn-audio').innerText = `🎵 播放隨機 BGM`;
        }

        function startGame(title, imgUrl) {
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.getElementById('current-title').innerText = `PLAYING: ${title}`;
            currentImgUrl = imgUrl;

            playRandomMusic();
            generateEdgeRelations();
            createPuzzlePieces();
        }

        // 隨機生成網格每條邊的凹凸關係 (1=凸, -1=凹, 0=平)
        function generateEdgeRelations() {
            edgesData = [];
            for (let r = 0; r < ROWS; r++) {
                edgesData[r] = [];
                for (let c = 0; c < COLS; c++) { edgesData[r][c] = [0, 0, 0, 0]; }
            }
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (c < COLS - 1) {
                        let type = Math.random() > 0.5 ? 1 : -1;
                        edgesData[r][c][1] = type; edgesData[r][c+1][3] = -type;
                    }
                    if (r < ROWS - 1) {
                        let type = Math.random() > 0.5 ? 1 : -1;
                        edgesData[r][c][2] = type; edgesData[r+1][c][0] = -type;
                    }
                }
            }
        }

        // 利用 SVG Path 動態繪製不規則凹凸形狀
        function createPuzzlePiecePath(top, right, bottom, left) {
            let s = PIECE_SIZE; let p = s * 0.2; let path = `M 0 0`;
            if (top === 1) { path += ` H ${s*0.35} C ${s*0.35} ${-p}, ${s*0.4} ${-p}, ${s*0.4} ${-p} C ${s*0.35} ${-p*1.6}, ${s*0.65} ${-p*1.6}, ${s*0.6} ${-p} C ${s*0.6} ${-p}, ${s*0.65} ${-p}, ${s*0.65} 0 H ${s}`; } 
            else if (top === -1) { path += ` H ${s*0.35} C ${s*0.35} ${p}, ${s*0.4} ${p}, ${s*0.4} ${p} C ${s*0.35} ${p*1.6}, ${s*0.65} ${p*1.6}, ${s*0.6} ${p} C ${s*0.6} ${p}, ${s*0.65} ${p}, ${s*0.65} 0 H ${s}`; } 
            else { path += ` H ${s}`; }
            if (right === 1) { path += ` V ${s*0.35} C ${s+p} ${s*0.35}, ${s+p} ${s*0.4}, ${s+p} ${s*0.4} C ${s+p*1.6} ${s*0.35}, ${s+p*1.6} ${s*0.65}, ${s+p} ${s*0.6} C ${s+p} ${s*0.6}, ${s+p} ${s*0.65}, ${s} ${s*0.65} V ${s}`; } 
            else if (right === -1) { path += ` V ${s*0.35} C ${s-p} ${s*0.35}, ${s-p} ${s*0.4}, ${s-p} ${s*0.4} C ${s-p*1.6} ${s*0.35}, ${s-p*1.6} ${s*0.65}, ${s-p} ${s*0.6} C ${s-p} ${s*0.6}, ${s-p} ${s*0.65}, ${s} ${s*0.65} V ${s}`; } 
            else { path += ` V ${s}`; }
            if (bottom === 1) { path += ` H ${s*0.65} C ${s*0.65} ${s+p}, ${s*0.6} ${s+p}, ${s*0.6} ${s+p} C ${s*0.65} ${s+p*1.6}, ${s*0.35} ${s+p*1.6}, ${s*0.4} ${s+p} C ${s*0.4} ${s+p}, ${s*0.35} ${s+p}, ${s*0.35} ${s} H 0`; } 
            else if (bottom === -1) { path += ` H ${s*0.65} C ${s*0.65} ${s-p}, ${s*0.6} ${s-p}, ${s*0.6} ${s-p} C ${s*0.65} ${s-p*1.6}, ${s*0.35} ${s-p*1.6}, ${s*0.4} ${s-p} C ${s*0.4} ${s-p}, ${s*0.35} ${s-p}, ${s*0.35} ${s} H 0`; } 
            else { path += ` H 0`; }
            if (left === 1) { path += ` V ${s*0.65} C ${-p} ${s*0.65}, ${-p} ${s*0.6}, ${-p} ${s*0.6} C ${-p*1.6} ${s*0.65}, ${-p*1.6} ${s*0.35}, ${-p} ${s*0.4} C ${-p} ${s*0.4}, ${-p} ${s*0.35}, 0 ${s*0.35} V 0`; } 
            else if (left === -1) { path += ` V ${s*0.65} C ${p} ${s*0.65}, ${p} ${s*0.6}, ${p} ${s*0.6} C ${p*1.6} ${s*0.65}, ${p*1.6} ${s*0.35}, ${p} ${s*0.4} C ${p} ${s*0.4}, ${p} ${s*0.35}, 0 ${s*0.35} V 0`; } 
            else { path += ` V 0`; }
            path += ` Z`; return path;
        }

        // 生成實體拼圖塊
        function createPuzzlePieces() {
            const pool = document.getElementById('pieces-pool');
            const pmax = PIECE_SIZE * 0.3; 

            let oldSvg = document.getElementById('puzzle-defs');
            if(oldSvg) oldSvg.remove();

            let svgDefs = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svgDefs.id = "puzzle-defs";
            svgDefs.style.width = "0"; svgDefs.style.height = "0"; svgDefs.style.position = "absolute";
            let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let edges = edgesData[r][c];
                    let pathD = createPuzzlePiecePath(edges[0], edges[1], edges[2], edges[3]);
                    let clipPath = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
                    clipPath.setAttribute("id", `clip-${r}-${c}`);
                    let pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    pathEl.setAttribute("d", pathD);
                    clipPath.appendChild(pathEl); defs.appendChild(clipPath);
                }
            }
            svgDefs.appendChild(defs); document.body.appendChild(svgDefs);

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const piece = document.createElement('div');
                    piece.classList.add('puzzle-piece');
                    piece.style.width = `${PIECE_SIZE + pmax * 2}px`;
                    piece.style.height = `${PIECE_SIZE + pmax * 2}px`;

                    const targetX = c * PIECE_SIZE - pmax;
                    const targetY = r * PIECE_SIZE - pmax;
                    piece.dataset.correctX = targetX; piece.dataset.correctY = targetY;

                    const innerImg = document.createElement('div');
                    innerImg.style.width = '100%'; innerImg.style.height = '100%';
                    innerImg.style.backgroundImage = `url(${currentImgUrl})`;
                    innerImg.style.backgroundSize = `${BOARD_SIZE}px ${BOARD_SIZE}px`;
                    innerImg.style.backgroundPosition = `-${c * PIECE_SIZE - pmax}px -${r * PIECE_SIZE - pmax}px`;
                    innerImg.style.clipPath = `url(#clip-${r}-${c})`;
                    innerImg.style.transform = `translate(${pmax}px, ${pmax}px)`;
                    piece.appendChild(innerImg);

                    const randomX = Math.random() * (pool.clientWidth - PIECE_SIZE - pmax * 2);
                    const randomY = Math.random() * (pool.clientHeight - PIECE_SIZE - pmax * 2);
                    piece.style.left = `${randomX}px`; piece.style.top = `${randomY}px`;
                    
                    pool.appendChild(piece);
                    enableDrag(piece);
                }
            }
        }

        function enableDrag(el) {
            let offsetX = 0, offsetY = 0; let isDragging = false;
            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
                e.preventDefault(); isDragging = true;
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                const rect = el.getBoundingClientRect();
                offsetX = clientX - rect.left; offsetY = clientY - rect.top;

                if(el.parentElement.id === 'pieces-pool') {
                    const currentBodyRect = document.body.getBoundingClientRect();
                    el.style.left = `${rect.left - currentBodyRect.left}px`;
                    el.style.top = `${rect.top - currentBodyRect.top}px`;
                    document.body.appendChild(el);
                }
                document.addEventListener('mousemove', dragMove);
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchend', dragEnd);
            }

            function dragMove(e) {
                if (!isDragging) return;
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                const bodyRect = document.body.getBoundingClientRect();
                el.style.left = `${clientX - bodyRect.left - offsetX}px`;
                el.style.top = `${clientY - bodyRect.top - offsetY}px`;
            }

            function dragEnd() {
                if (!isDragging) return; isDragging = false;
                document.removeEventListener('mousemove', dragMove);
                document.removeEventListener('touchmove', dragMove);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchend', dragEnd);

                const board = document.getElementById('puzzle-board');
                const boardRect = board.getBoundingClientRect();
                const pieceRect = el.getBoundingClientRect();
                const relativeX = pieceRect.left - boardRect.left;
                const relativeY = pieceRect.top - boardRect.top;
                const targetX = parseFloat(el.dataset.correctX);
                const targetY = parseFloat(el.dataset.correctY);

                if (Math.abs(relativeX - targetX) < 30 && Math.abs(relativeY - targetY) < 30) {
                    el.style.left = `${targetX}px`; el.style.top = `${targetY}px`;
                    board.appendChild(el); el.style.cursor = 'default';
                    el.removeEventListener('mousedown', dragStart);
                    el.removeEventListener('touchstart', dragStart);
                    checkWinCondition();
                }
            }
        }

        function checkWinCondition() {
            const board = document.getElementById('puzzle-board');
            if (board.children.length === (ROWS * COLS)) {
                setTimeout(() => { alert('🎉 太厲害了！順利拼好了專輯！'); }, 300);
            }
        }

        // 啟動網頁選單初始化
        initMenu();
    </script>
</body>
</html>
